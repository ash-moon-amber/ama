name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install "mkdocs-material[blog]"
          pip install mkdocs-rss-plugin

      # 1. 物理ディレクトリの存在保証とCSS生成
      - name: Ensure src directory and generate CSS
        run: |
          mkdir -p src/stylesheets
          mkdir -p src/img
          mkdir -p src/assets
          
          if [ ! -f "src/index.md" ]; then
            echo "# ホーム" > src/index.md
          fi
          
          cat <<'EOF' > src/stylesheets/extra.css
          /* 1. リンクとタイトルの太字化 */
          .md-typeset a, 
          .md-nav__link, 
          .md-post__title a,
          .md-typeset h1,
          .md-typeset h2 {
              font-weight: bold !important;
          }

          /* 2. ダークモード (slate) の配色強制 */
          body[data-md-color-scheme="slate"] {
              .md-typeset h1, md-typeset h2, md-typeset h3, md-typeset h4, md-typeset h5: #e0e0e0 !important;
              --md-typeset-a-color: #e0e0e0 !important;
              --md-accent-fg-color: #e0e0e0 !important;
          }

          /* 3. ライトモード (default) の配色強制 */
          body[data-md-color-scheme="default"] {
              .md-typeset h1, md-typeset h2, md-typeset h3, md-typeset h4, md-typeset h5: #f5f5f5 !important;
              --md-default-bg-color: #f5f5f5 !important;
              --md-default-bg-color--light: #f5f5f5 !important;
              --md-typeset-a-color: #212121 !important;
              --md-accent-fg-color: #212121 !important;
          }

          /* 4. 詳細ページ内のリンク色を再適用 */
          .md-content__inner .md-typeset a {
              color: var(--md-typeset-a-color) !important;
          }
          EOF

      # 2. mkdocs.yml を生成
      - name: Create mkdocs.yml
        run: |
          TS=$(date +'%Y%m%d%H%M%S')
          
          cat <<'EOF' > mkdocs.yml
          site_name: 灰月琥珀 - Ash Moon Amber
          site_url: https://ash-moon-amber.github.io/ama/
          site_description: 琥珀の技術と日常の記録
          repo_name: GitHub
          repo_url: https://github.com/ash-moon-amber/ama
          
          theme:
            name: material
            language: ja
            logo: assets/logo.png
            favicon: assets/logo.png
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: ダークモード
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-5
                  name: ライトモード
            features:
              - navigation.tabs
              - navigation.indexes
              - navigation.sections
              - toc.integrate
              - content.code.copy

          extra:
            og_image: assets/og-image.png

          markdown_extensions:
            - nl2br
            - pymdownx.highlight:
                anchor_linenums: true
                line_spans: __span
                pygments_lang_class: true
            - pymdownx.inlinehilite
            - pymdownx.snippets
            - pymdownx.superfences:
                custom_fences:
                  - name: mermaid
                    class: mermaid
                    format: !!python/name:pymdownx.superfences.fence_code_format

          nav:
            - Blog:
                - index.md
                - Tags: tags.md
            - Profile: profile.md
          
          # ★ パスを site_url からの相対（/ama/抜き）に戻し、MkDocsのビルドに任せる
          extra_css:
            - stylesheets/extra.css?v=TIMESTAMP_PLACEHOLDER

          plugins:
            - blog:
                blog_dir: .
                post_dir: posts
                draft_if_future: false
            - search
            - tags:
                tags_file: tags.md
            - rss:
                match_path: posts/.*
            - social:
                cards: true
                cards_layout_options:
                  background_color: "#212121"

          docs_dir: src
          site_dir: site
          EOF

          sed -i "s/TIMESTAMP_PLACEHOLDER/$TS/g" mkdocs.yml

      # 3. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 4. 公開ディレクトリ(public)の整理
      - name: Prepare Public Directory
        run: |
          # 完全にクリーンな状態から作成
          rm -rf public
          mkdir -p public
          
          # 1. ビルドされたsiteの中身をすべてコピー
          if [ -d "site" ]; then
            cp -r site/* public/
          fi
          
          # 2. 【重要】stylesheets を public 直下に物理コピー (404対策)
          if [ -d "src/stylesheets" ]; then
            mkdir -p public/stylesheets
            cp -r src/stylesheets/* public/stylesheets/
          fi
          
          # 3. 画像類の物理コピー
          if [ -d "src/img" ]; then
            mkdir -p public/img
            cp -r src/img/* public/img/
          fi
          
          if [ -d "src/assets" ]; then
            mkdir -p public/assets
            cp -r src/assets/* public/assets/
          fi

          [ -d "app" ] && cp -r app public/ || true
          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4