name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install "mkdocs-material[blog]"
          pip install mkdocs-static-i18n

      # 1. mkdocs.yml がない場合、ここでダークモードとブログ設定を自動生成
      - name: Create mkdocs.yml dynamically
        run: |
          cat <<EOF > mkdocs.yml
          site_name: My Technical Blog
          theme:
            name: material
            language: ja
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
            features:
              - navigation.tabs
              - navigation.sections
              - navigation.expand
              - toc.integrate
          plugins:
            - blog
            - i18n:
                default_language: ja
          docs_dir: src
          site_dir: site
          EOF

      # 2. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 3. 公開用フォルダ (public) の集約
      - name: Prepare Public Directory
        run: |
          mkdir -p public
          # MkDocs 成果物
          [ -d "site" ] && cp -r site/* public/
          # app フォルダがあればコピー
          [ -d "app" ] && cp -r app public/
          # _root 内の設定ファイルをルートに展開
          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
