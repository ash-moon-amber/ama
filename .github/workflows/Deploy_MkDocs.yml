name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Node.js 20 警告対策と実行環境の固定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install "mkdocs-material[blog]"
          pip install mkdocs-rss-plugin

      # 1. 物理ディレクトリの存在保証
      - name: Ensure src directory and generate CSS
        run: |
          mkdir -p src/stylesheets
          mkdir -p src/img
          mkdir -p src/assets
          
          if [ ! -f "src/index.md" ]; then
            echo "# ホーム" > src/index.md
          fi
          
          cat <<'EOF' > src/stylesheets/extra.css
          .md-typeset a { font-weight: bold !important; }
          [data-md-color-scheme="slate"] {
              --md-typeset-a-color: #e0e0e0 !important;
              --md-accent-fg-color: #e0e0e0 !important;
          }
          [data-md-color-scheme="default"] {
              --md-default-bg-color: #f5f5f5 !important;
              --md-default-bg-color--light: #f5f5f5 !important;
              --md-typeset-a-color: #212121 !important;
              --md-accent-fg-color: #212121 !important;
          }
          EOF

      # 2. mkdocs.yml を生成（OGP設定を統合）
      - name: Create mkdocs.yml
        run: |
          TS=$(date +'%Y%m%d%H%M%S')
          
          cat <<'EOF' > mkdocs.yml
          site_name: 灰月琥珀 - Ash Moon Amber
          site_url: https://ash-moon-amber.github.io/ama/
          site_description: 琥珀の技術と日常の記録
          repo_name: GitHub
          repo_url: https://github.com/ash-moon-amber/ama
          
          theme:
            name: material
            language: ja
            logo: assets/logo.png
            favicon: assets/logo.png
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: ダークモード
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-5
                  name: ライトモード
            features:
              - navigation.tabs
              - navigation.indexes
              - navigation.sections
              - toc.integrate
              - content.code.copy

          # ★ OGP用：SNSにURLを貼った時の共通画像設定 1200 x 630
          extra:
            og_image: assets/og-image.png

          markdown_extensions:
            - nl2br
            - pymdownx.highlight:
                anchor_linenums: true
                line_spans: __span
                pygments_lang_class: true
            - pymdownx.inlinehilite
            - pymdownx.snippets
            - pymdownx.superfences:
                custom_fences:
                  - name: mermaid
                    class: mermaid
                    format: !!python/name:pymdownx.superfences.fence_code_format

          nav:
            - Blog:
                - index.md
                - Tags: tags.md
            - Profile: profile.md
          
          extra_css:
            - stylesheets/extra.css?v=TIMESTAMP_PLACEHOLDER

          plugins:
            - blog:
                blog_dir: .
                post_dir: posts
                draft_if_future: false
                archive_url_date_format: yyyy/MM
                archive_date_format: yyyy年MM月
            - search
            - tags:
                tags_file: tags.md
            - rss:
                match_path: posts/.*
                date_from_meta:
                  as_creation: date
            # ★ プレビュー画像を自動構成するためのプラグイン
            - social:
                cards: true
                cards_layout_options:
                  background_color: "#212121"

          docs_dir: src
          site_dir: site
          EOF

          sed -i "s/TIMESTAMP_PLACEHOLDER/$TS/g" mkdocs.yml

      # 3. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 4. 公開ディレクトリ(public)の整理
      - name: Prepare Public Directory
        run: |
          mkdir -p public
          [ -d "site" ] && cp -r site/* public/
          
          # 画像類の物理コピー
          [ -d "src/img" ] && cp -r src/img public/ || true
          [ -d "src/assets" ] && cp -r src/assets public/ || true
          [ -d "app" ] && cp -r app public/ || true

          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4