name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Node.js 20 警告対策と実行環境の固定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install "mkdocs-material[blog]"
          pip install mkdocs-rss-plugin # RSS

      # 1. srcディレクトリの存在保証（空だとビルドエラーになるため）
      - name: Ensure src directory exists
        run: |
          mkdir -p src
          if [ ! -f "src/index.md" ]; then
            echo "# ホーム" > src/index.md
            echo "GitHub Pages へようこそ。" >> src/index.md
          fi

      # 2. mkdocs.yml を生成（RSS配信設定を追加）
      - name: Create mkdocs.yml
        run: |
          cat <<'EOF' > mkdocs.yml
          site_name: 灰月琥珀 - Ash Moon Amber
          site_url: https://ash-moon-amber.github.io/ama/
          site_description: 琥珀の技術と日常の記録 # ★RSS仕様として必須のパラメータです
          repo_name: GitHub
          repo_url: https://github.com/ash-moon-amber/ama
          
          theme:
            name: material
            language: ja
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black   # ★リンクやアクティブ色（whiteかgreyを指定）
                accent: grey    # ★ホバー時の色
                toggle:
                  icon: material/brightness-4
                  name: ダークモード
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: grey   # ライトモード時の色
                accent: black
                toggle:
                  icon: material/brightness-6
                  name: ライトモード
            features:
              - navigation.tabs
              - navigation.indexes
              - navigation.sections
              - toc.integrate

          markdown_extensions:
            - nl2br

          nav:
            - Blog:
                - index.md
                - Tags: tags.md
            - Profile: profile.md
          
          extra_css:
            - stylesheets/extra.css

          plugins:
            - blog:
                blog_dir: .
                post_dir: posts
                draft_if_future: false
                archive_url_date_format: yyyy/MM
                archive_date_format: yyyy年MM月
            - search
            - tags:
                tags_file: tags.md
            - rss:
                match_path: posts/.* # ★Profile等を除外して「ブログ記事」のみを配信するフィルタ
                date_from_meta:
                  as_creation: date

          docs_dir: src
          site_dir: site
          EOF

      # 3. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 4. 公開ディレクトリ(public)の整理
      - name: Prepare Public Directory
        run: |
          mkdir -p public
          [ -d "site" ] && cp -r site/* public/
          [ -d "app" ] && cp -r app public/
          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
