name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Node.js 20 警告対策と実行環境の固定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install "mkdocs-material[blog]"

      # 1. srcディレクトリの存在保証（空だとビルドエラーになるため）
      - name: Ensure src directory exists
        run: |
          mkdir -p src
          if [ ! -f "src/index.md" ]; then
            echo "# ホーム" > src/index.md
            echo "GitHub Pages へようこそ。" >> src/index.md
          fi

      # 2. mkdocs.yml を生成（GitHubリンクを標準位置へ移動）
      - name: Create mkdocs.yml
        run: |
          cat <<'EOF' > mkdocs.yml
          site_name: 灰月琥珀 - Ash Moon Amber
          repo_name: GitHub
          repo_url: https://github.com/ash-moon-amber/ama
          theme:
            name: material
            language: ja
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: ダークモード
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-6
                  name: ライトモード
            features:
              - navigation.tabs
              - navigation.sections
              - toc.integrate

          nav:
            - AMA_Blog: index.md
            - Profile: profile.md

          plugins:
            - blog:
                blog_dir: .
                post_dir: posts
                draft_if_future: false
          docs_dir: src
          site_dir: site
          EOF

      # 3. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 4. 公開ディレクトリ(public)の整理
      - name: Prepare Public Directory
        run: |
          mkdir -p public
          [ -d "site" ] && cp -r site/* public/
          [ -d "app" ] && cp -r app public/
          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
