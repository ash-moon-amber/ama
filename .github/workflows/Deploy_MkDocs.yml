name: Deploy MkDocs Blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Node.js 20 の警告を消し、Node.js 24 で実行するための設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install "mkdocs-material[blog]"
          pip install mkdocs-static-i18n

      # 1. srcディレクトリがない、または空の場合にサンプルを作成（ビルドエラー回避）
      - name: Ensure src directory exists
        run: |
          mkdir -p src
          if [ ! -f "src/index.md" ]; then
            echo "# Welcome to My Blog" > src/index.md
          fi

      # 2. mkdocs.yml を生成（インデントを厳密に修正）
      - name: Create mkdocs.yml
        run: |
          cat <<'EOF' > mkdocs.yml
          site_name: My Technical Blog
          theme:
            name: material
            language: ja
            palette:
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: black
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
            features:
              - navigation.tabs
              - navigation.sections
              - navigation.expand
              - toc.integrate
          plugins:
            - blog
            - i18n:
                default_language: ja
          docs_dir: src
          site_dir: site
          EOF

      # 3. ビルド実行
      - name: Build MkDocs
        run: mkdocs build

      # 4. 公開ディレクトリ(public)の整理
      - name: Prepare Public Directory
        run: |
          mkdir -p public
          [ -d "site" ] && cp -r site/* public/
          [ -d "app" ] && cp -r app public/
          if [ -d "_root" ]; then
            cp -r _root/.* public/ 2>/dev/null || cp -r _root/* public/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
