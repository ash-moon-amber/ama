name: Deploy Markdown to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Pandocのインストール（Markdown -> HTML変換用）
      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      # 2. 出力用ディレクトリの作成
      - name: Create output directory
        run: mkdir -p ./public

      # 3. Markdown を HTML に変換
      # --standalone をつけることで、完全なHTMLファイル（headタグ等含む）になります
      - name: Build HTML from Markdown
        run: |
          pandoc src/index.md -s -o ./public/index.html

      # 4. セットアップ
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 5. アーティファクトのアップロード（作成した ./public を指定）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      # 6. デプロイ
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
